<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 33 - Đèn Kéo Quân</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        h1 { margin-bottom: 40px; color: #f1c40f; text-align: center; }
        
        /* Khung 3D cho đèn kéo quân */
        .scene { width: 200px; height: 250px; perspective: 1000px; margin-bottom: 50px; }
        .lantern { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.1s linear; }
        .face { position: absolute; width: 200px; height: 250px; left: 0; top: 0; border: 2px solid #e74c3c; background: #222; }
        .face img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Tọa độ xoay 6 mặt */
        .face1 { transform: rotateY(0deg) translateZ(173px); }
        .face2 { transform: rotateY(60deg) translateZ(173px); }
        .face3 { transform: rotateY(120deg) translateZ(173px); }
        .face4 { transform: rotateY(180deg) translateZ(173px); }
        .face5 { transform: rotateY(240deg) translateZ(173px); }
        .face6 { transform: rotateY(300deg) translateZ(173px); }

        /* Vùng bài tập 32 và nút bấm */
        .bai32-section { margin-top: 50px; text-align: center; width: 100%; max-width: 800px; border-top: 2px dashed #444; padding-top: 30px; }
        .iframe-container { width: 100%; height: 500px; border: 2px solid #fff; border-radius: 8px; margin-top: 15px; overflow: hidden; background: #fff;}
        .back-btn { margin-top: 30px; display: inline-block; padding: 10px 20px; background: #e74c3c; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #c0392b; }
        .link-text { color: #f1c40f; word-break: break-all; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h1>BÀI TẬP 33: ĐÈN KÉO QUÂN 3D</h1>

    <div class="scene">
        <div class="lantern" id="lantern">
            <!-- CHÚ Ý: Đảm bảo có 6 file ảnh từ anh1.jpg đến anh6.jpg nằm cùng thư mục với file HTML này -->
            <div class="face face1"><img src="anh1.jpg" alt="Ảnh 1"></div>
            <div class="face face2"><img src="anh2.jpg" alt="Ảnh 2"></div>
            <div class="face face3"><img src="anh3.jpg" alt="Ảnh 3"></div>
            <div class="face face4"><img src="anh4.jpg" alt="Ảnh 4"></div>
            <div class="face face5"><img src="anh5.jpg" alt="Ảnh 5"></div>
            <div class="face face6"><img src="anh6.jpg" alt="Ảnh 6"></div>
        </div>
    </div>

    <!-- Nút quay lại Portfolio Bài 32 -->
    <a href="https://laserbouldergiangnguyen-boop.github.io/GiuaKyLTWTH/My%20portfolio/index.html" class="back-btn">← Quay lại trang Portfolio của Giang</a>

    <!-- KẾT HỢP BÀI TẬP 32 (PORTFOLIO) -->
    <div class="bai32-section">
        <h2>KẾT QUẢ BÀI TẬP 32 (MY PORTFOLIO)</h2>
        <a href="https://laserbouldergiangnguyen-boop.github.io/GiuaKyLTWTH/My%20portfolio/index.html" target="_blank" class="link-text">
            https://laserbouldergiangnguyen-boop.github.io/GiuaKyLTWTH/My%20portfolio/index.html
        </a>
        
        <!-- Nhúng trực tiếp trang Portfolio vào đây cho trực quan -->
        <div class="iframe-container">
            <iframe src="https://laserbouldergiangnguyen-boop.github.io/GiuaKyLTWTH/My%20portfolio/index.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        const lantern = document.getElementById('lantern');
        let angle = 0;
        let isRotating = true;

        function rotateLantern() {
            if (isRotating) {
                angle -= 0.6; // Tốc độ xoay đèn
                lantern.style.transform = `rotateY(${angle}deg)`;
            }
            requestAnimationFrame(rotateLantern);
        }

        // Rê chuột vào thì dừng, bỏ ra quay tiếp
        lantern.addEventListener('mouseenter', () => isRotating = false);
        lantern.addEventListener('mouseleave', () => isRotating = true);

        rotateLantern();
    </script>
</body>
</html>
